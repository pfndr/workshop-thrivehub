<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    // Brand constants, music library, and QR paths → js/config.js

    // =====================================================
    // AUDIO ENGINE — plays LoFi MP3s with anti-repeat shuffling.
    // Each timer slide pulls a fresh track. If the track ends while the timer
    // is still running, a different track from the pool plays next.
    // The end-of-timer chime is still procedural (Web Audio).
    // =====================================================
    class AudioEngine {
      constructor() {
        this.audioElement = null;
        this.usedTracks = new Set();
        this.currentTrack = null;
        this.targetVolume = 0.32;
        this.muted = false;
        this.fadeTimer = null;
        this.endedHandler = null;
        this.chimeCtx = null;
      }

      // Pick a track that hasn't been used yet this session.
      // If all have been used, reset the pool but never repeat the most recent.
      _pickNextTrack() {
        if (this.usedTracks.size >= LOFI_TRACKS.length) {
          this.usedTracks.clear();
        }
        const last = this.currentTrack;
        let candidates = LOFI_TRACKS.filter(
          (t) => !this.usedTracks.has(t) && t !== last
        );
        if (candidates.length === 0) {
          // Edge case: only the last track is unused — accept it
          candidates = LOFI_TRACKS.filter((t) => !this.usedTracks.has(t));
        }
        if (candidates.length === 0) candidates = LOFI_TRACKS.slice();
        const pick = candidates[Math.floor(Math.random() * candidates.length)];
        this.usedTracks.add(pick);
        this.currentTrack = pick;
        return pick;
      }

      _trackUrl(filename) {
        return LOFI_DIR + encodeURIComponent(filename);
      }

      _clearFade() {
        if (this.fadeTimer) {
          clearInterval(this.fadeTimer);
          this.fadeTimer = null;
        }
      }

      _fadeTo(target, durationMs) {
        if (!this.audioElement) return;
        this._clearFade();
        const audio = this.audioElement;
        const start = audio.volume;
        const delta = target - start;
        const startTime = performance.now();
        this.fadeTimer = setInterval(() => {
          if (!this.audioElement) {
            this._clearFade();
            return;
          }
          const elapsed = performance.now() - startTime;
          const t = Math.min(1, elapsed / durationMs);
          this.audioElement.volume = Math.max(0, Math.min(1, start + delta * t));
          if (t >= 1) this._clearFade();
        }, 25);
      }

      startMusic(_variantIgnored) {
        this.stopMusic(0);
        const track = this._pickNextTrack();
        const audio = new Audio(this._trackUrl(track));
        audio.preload = "auto";
        audio.volume = 0;

        // When a track ends naturally, queue a different one
        this.endedHandler = () => {
          if (this.audioElement !== audio) return;
          const next = this._pickNextTrack();
          audio.src = this._trackUrl(next);
          audio.play().catch(() => {});
        };
        audio.addEventListener("ended", this.endedHandler);

        const playPromise = audio.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch((err) => {
            console.warn("LoFi music playback failed:", err);
          });
        }

        this.audioElement = audio;
        this._fadeTo(this.muted ? 0 : this.targetVolume, 700);
      }

      stopMusic(fadeMs = 1000) {
        const audio = this.audioElement;
        if (!audio) return;
        this.audioElement = null;
        const handler = this.endedHandler;
        this.endedHandler = null;
        this._clearFade();

        const teardown = () => {
          try {
            if (handler) audio.removeEventListener("ended", handler);
            audio.pause();
            audio.src = "";
            audio.load();
          } catch (e) {}
        };

        if (fadeMs <= 0) {
          teardown();
          return;
        }

        const startVol = audio.volume;
        const startTime = performance.now();
        const fadeId = setInterval(() => {
          const elapsed = performance.now() - startTime;
          const t = Math.min(1, elapsed / fadeMs);
          audio.volume = Math.max(0, startVol * (1 - t));
          if (t >= 1) {
            clearInterval(fadeId);
            teardown();
          }
        }, 25);
      }

      setMuted(muted) {
        this.muted = muted;
        if (this.audioElement) {
          this._fadeTo(muted ? 0 : this.targetVolume, 250);
        }
      }

      // End-of-timer chime — still procedural for crisp delivery.
      playChime() {
        if (!this.chimeCtx) {
          const Ctor = window.AudioContext || window.webkitAudioContext;
          this.chimeCtx = new Ctor();
        }
        const ctx = this.chimeCtx;
        if (ctx.state === "suspended") ctx.resume();

        const t = ctx.currentTime;
        const freqs = [523.25, 659.25, 783.99]; // C–E–G
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, t);
        master.gain.linearRampToValueAtTime(0.45, t + 0.04);
        master.gain.exponentialRampToValueAtTime(0.0001, t + 2.6);
        master.connect(ctx.destination);

        freqs.forEach((f, i) => {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = "sine";
          osc.frequency.value = f;
          g.gain.value = 0.4;
          osc.connect(g);
          g.connect(master);
          osc.start(t + i * 0.09);
          osc.stop(t + 2.7);

          const o2 = ctx.createOscillator();
          const g2 = ctx.createGain();
          o2.type = "sine";
          o2.frequency.value = f * 2;
          g2.gain.value = 0.08;
          o2.connect(g2);
          g2.connect(master);
          o2.start(t + i * 0.09);
          o2.stop(t + 2.7);
        });
      }

      // Kept for backward compat; HTMLAudio doesn't need a context here.
      ensureContext() { return null; }
    }

    // =====================================================
    // SHARED PRIMITIVES
    // =====================================================

    // PF logo lockup — uses the brand PNG (logo + wordmark _ white.png) with
    // an inline-SVG fallback if the file is missing.
    function PFLockup({ height = 28 }) {
      const [errored, setErrored] = useState(false);
      if (!errored) {

    // =====================================================
    // TIMER LOGIC HOOK
    // States:
    //   idle    – never started (seconds === durationSec, !running, !ended)
    //   running – timer counting down + music playing
    //   paused  – running was stopped mid-timer (seconds < durationSec, !ended)
    //   ended   – seconds reached 0
    // =====================================================
    function useTimerLogic(durationSec, audio, isActive, musicVariant = "bright", silent = false) {
      const [seconds, setSeconds] = useState(durationSec);
      const [running, setRunning] = useState(false);
      const [muted, setMuted] = useState(false);
      const [ended, setEnded] = useState(false);
      const intervalRef = useRef(null);

      // When the slide becomes inactive, fully reset so timer restarts fresh next visit
      useEffect(() => {
        setRunning(false);
        setSeconds(durationSec);
        setEnded(false);
        if (intervalRef.current) {
          clearInterval(intervalRef.current);
          intervalRef.current = null;
        }
        if (!isActive) audio.stopMusic(800);
      }, [isActive, durationSec]);

      useEffect(() => {
        if (!running) return;
        intervalRef.current = setInterval(() => {
          setSeconds((s) => {
            if (s <= 1) {
              clearInterval(intervalRef.current);
              intervalRef.current = null;
              return 0;
            }
            return s - 1;
          });
        }, 1000);
        return () => {
          if (intervalRef.current) {
            clearInterval(intervalRef.current);
            intervalRef.current = null;
          }
        };
      }, [running]);

      useEffect(() => {
        if (running && seconds === 0) {
          setRunning(false);
          setEnded(true);
          audio.playChime();
          audio.stopMusic(900);
        }
      }, [seconds, running, audio]);

      const start = useCallback(() => {
        if (seconds === 0) {
          setSeconds(durationSec);
          setEnded(false);
        }
        setRunning(true);
        if (!silent) audio.startMusic(musicVariant);
      }, [seconds, durationSec, audio, musicVariant, silent]);

      // Pause: stop timer + fade music out, but KEEP current seconds
      const pause = useCallback(() => {
        setRunning(false);
        if (!silent) audio.stopMusic(800);
      }, [audio, silent]);

      // Reset: full reset to original duration
      const reset = useCallback(() => {
        setRunning(false);
        setSeconds(durationSec);
        setEnded(false);
        if (!silent) audio.stopMusic(800);
      }, [durationSec, audio, silent]);

      const toggleMute = useCallback(() => {
        setMuted((m) => {
          audio.setMuted(!m);
          return !m;
        });
      }, [audio]);

      const warning = running && seconds <= 30 && seconds > 0;
      const isPaused = !running && !ended && seconds < durationSec;
      const isIdle = !running && !ended && seconds === durationSec;

      return {
        seconds, running, ended, warning, muted,
        isPaused, isIdle,
        start, pause, reset, toggleMute,
      };
    }

    function BrowserOverlay({ state, onClose }) {
      const iframeRef = useRef(null);
      const { url, label, image, visible } = state;
      const [imgError, setImgError] = useState(false);

      useEffect(() => { setImgError(false); }, [image]);

      useEffect(() => {
        if (!visible) return;
        const handler = (e) => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [visible, onClose]);

      const refresh = () => {
        const iframe = iframeRef.current;
        if (iframe) { const src = iframe.src; iframe.src = ""; iframe.src = src; }
      };
      const openTab = () => { if (url) window.open(url, "_blank", "noopener"); };

      if (!visible || !url) return null;
      const display = url.replace(/^https?:\/\//, "");

      return (
        <div
          onClick={onClose}
          style={{
            position: "fixed", inset: 0, zIndex: 500,
            display: "flex", alignItems: "center", justifyContent: "center",
            background: "rgba(0,0,0,0.82)",
            padding: "4.5vh 5vw",

          <div
            onClick={(e) => e.stopPropagation()}
            style={{

    function WelcomeMusicToggle({ audio }) {
      const [playing, setPlaying] = useState(false);
      const toggle = () => {
        if (!audio) return;
        if (playing) {
          audio.stopMusic(800);
          setPlaying(false);
        } else {
          audio.startMusic();
          setPlaying(true);
        }
      };
      // If we navigate away while playing, the global goTo handler stops the audio.
      // Reset our local state on unmount so a return visit shows the play icon.
      useEffect(() => () => setPlaying(false), []);

      // Sized & placed to occupy the spot where the (disabled) prev nav arrow lives
      // on every other slide — keeps the chrome row visually consistent.
      return (
        <button
          onClick={toggle}
          title={playing ? "Pause welcome music" : "Play welcome music"}
          aria-label={playing ? "Pause welcome music" : "Play welcome music"}
          style={{
            position: "fixed",

    // Fixed breadcrumb for timer slides: the full three-loop journey,
    // IDEA → PLAN → CREATE → TEST shown three times. Completed loops glow dim
    // yellow, the current phase(s) light up, everything ahead stays muted.
    function LoopBreadcrumb({ loop, phases, all = false, solo = false }) {
      const PHASES = solo
        ? ["IDEA", "PLAN", "CREATE", "TEST", "SYNTHESIZE"]
        : ["IDEA", "PLAN", "CREATE", "TEST"];
      const LOOPS = solo ? [1] : [1, 2, 3];
      const chip = (state) => ({
        padding: "0.2rem 0.5rem",
        borderRadius: 6,
        background: state === "active" ? ACCENT_DIM : "transparent",
        border: `1px solid ${state === "active" ? ACCENT : "transparent"}`,
        color: state === "active" ? ACCENT : state === "done" || state === "plain" ? "rgba(255,204,100,0.75)" : TEXT_MUTED,
        opacity: state === "off" ? 0.6 : 1,
        fontWeight: 700,
        fontSize: "0.58rem",
        letterSpacing: 1.2,
        whiteSpace: "nowrap",
      });
      return (
        <div style={{
          display: "flex",
          alignItems: "center",
          gap: 10,
          padding: "0.3rem 0.9rem",
          background: all ? "rgba(255,204,100,0.10)" : "rgba(15,15,15,0.55)",
          border: `1px solid ${all ? ACCENT : "rgba(255,255,255,0.08)"}`,
          boxShadow: all ? "0 0 16px rgba(255,204,100,0.15)" : "none",
          borderRadius: 999,
          backdropFilter: "blur(6px)",
          WebkitBackdropFilter: "blur(6px)",
        }}>
          {LOOPS.map((n) => (
            <React.Fragment key={n}>
              {n > 1 && <div style={{ width: 1, height: 14, background: "rgba(255,255,255,0.15)", flexShrink: 0 }} />}
              <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                {PHASES.map((p, i) => {
                  let state;
                  if (all) state = "plain";
                  else if (solo) {
                    const activeIdx = PHASES.findIndex((x) => phases.includes(x));
                    state = phases.includes(p) ? "active" : (i < activeIdx ? "done" : "off");
                  } else {
                    state = n < loop ? "done" : n > loop ? "off" : (phases.includes(p) ? "active" : "off");
                  }
                  return (
                    <React.Fragment key={p}>
                      {i > 0 && <span style={{ color: TEXT_MUTED, opacity: 0.4, fontSize: "0.55rem" }}>&#8594;</span>}
                      <span style={chip(state)}>{p}</span>
                    </React.Fragment>
                  );
                })}
              </div>
            </React.Fragment>
          ))}
        </div>
      );
    }

    // PRESENTATION TIMER · silent countdown per presenter, with name input + counter
    // Silent (no music while they present), name input + counter, Next button.
    function PresentationTimerSlide({ isActive, audio, duration = 120, promptItems }) {
      const PRES_DURATION = duration;
      const [name, setName] = useState("");
      const [presIndex, setPresIndex] = useState(1);
      const [presTotal, setPresTotal] = useState("");
      const t = useTimerLogic(PRES_DURATION, audio, isActive, "spotlight", /* silent */ true);
      const inputRef = useRef(null);

      const showInput = t.isIdle || t.ended;
      const canStart = name.trim().length > 0;

      useEffect(() => {
        if (isActive && showInput && inputRef.current) {
          setTimeout(() => inputRef.current && inputRef.current.focus(), 200);
        }
      }, [isActive, showInput]);

      const handleStart = () => { if (canStart) t.start(); };
      const handleNext = () => {
        setName("");
        setPresIndex((n) => n + 1);
        t.reset();
        setTimeout(() => inputRef.current && inputRef.current.focus(), 80);
      };

      return (
        <SlideShell dense>
          <div style={{ width: "100%", maxWidth: 1280, display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: "min(4vw, 56px)", alignItems: "center" }}>
            {/* Left: live presenter name display + prompts */}
            <div>
              <div style={{ display: "inline-block", padding: "0.35rem 1rem", borderRadius: 999, background: ACCENT_DIM, color: ACCENT, fontWeight: 700, fontSize: "0.85rem", letterSpacing: 1.6, marginBottom: "0.8rem" }}>
                🎤 NOW PRESENTING
              </div>
              <div style={{ fontSize: "clamp(2rem, 4vw, 3.6rem)", fontWeight: 800, color: name ? TEXT : TEXT_MUTED, letterSpacing: "-0.02em", lineHeight: 1.05, marginBottom: "1.2rem", minHeight: "1.1em" }}>
                {name || "[Product or person]"}
              </div>
              <div style={{ fontSize: "clamp(0.95rem, 1.15vw, 1.1rem)", color: TEXT, lineHeight: 1.55 }}>
                <ol style={{ listStyle: "decimal", paddingLeft: "1.3em", textAlign: "left", margin: 0 }}>
                  {(promptItems || [
                    <React.Fragment>What was your <strong>original hypothesis</strong>?</React.Fragment>,
                    <React.Fragment>Share the <strong>evolution from Loop 1 to Loop 3</strong></React.Fragment>,
                    <React.Fragment>What did you <strong>learn</strong>? What changed? What surprised you?</React.Fragment>,
                  ]).map((p, i) => (
                    <li key={i} style={{ marginBottom: "0.45em" }}>{p}</li>
                  ))}
                </ol>
              </div>
            </div>

            {/* Right: timer + input + controls */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
              <TimerDisplay seconds={t.seconds} warning={t.warning} ended={t.ended} compact />

              {showInput && (
                <div style={{ width: "100%", marginTop: 20 }}>
                  <input
                    ref={inputRef}
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter" && canStart) handleStart(); }}
                    placeholder="Product or person presenting…"
                    style={{
                      width: "100%",
                      background: "rgba(255,255,255,0.06)",
                      border: "1px solid rgba(255,255,255,0.18)",
                      borderRadius: 12,
                      padding: "0.8rem 1.1rem",
                      color: TEXT,
                      fontSize: "1.1rem",
                      fontFamily: FONT_STACK,
                      marginBottom: "0.75rem",
                      outline: "none",
                      boxSizing: "border-box",
                    }}
                  />
                  <div style={{ display: "flex", alignItems: "center", gap: 8, color: TEXT_MUTED, fontSize: "1rem" }}>
                    <span>Presenter <strong style={{ color: ACCENT }}>{presIndex}</strong> of</span>
                    <input
                      value={presTotal}
                      onChange={(e) => setPresTotal(e.target.value.replace(/\D/g, ""))}
                      placeholder="___"
                      style={{
                        width: 64,
                        background: "rgba(255,255,255,0.06)",
                        border: "1px dashed rgba(255,255,255,0.25)",
                        borderRadius: 6,
                        padding: "0.2rem 0.5rem",
                        color: TEXT,
                        textAlign: "center",
                        fontFamily: FONT_STACK,
                        fontSize: "1rem",
                      }}
                    />
                  </div>
                </div>
              )}

              <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginTop: 16, justifyContent: "center" }}>
                {(t.isIdle || t.isPaused || t.running) && (
                  <PrimaryButton
                    onClick={t.running ? t.pause : t.isPaused ? t.start : handleStart}
                    color={t.running ? WARN : ACCENT}
                  >
                    {t.running ? "Pause" : t.isPaused ? "Resume" : "Start"}
                  </PrimaryButton>
                )}
                {!t.isIdle && (
                  <PrimaryButton onClick={handleNext} color={ACCENT}>Next →</PrimaryButton>
                )}
              </div>
              {!t.isIdle && (
                <button
                  onClick={t.reset}
                  style={{
                    background: "transparent",
                    border: "none",
                    color: TEXT_MUTED,
                    fontSize: 13,
                    textDecoration: "underline",
                    textDecorationColor: "rgba(168,168,168,0.4)",
                    textUnderlineOffset: 3,
                    cursor: "pointer",
                    fontFamily: FONT_STACK,
                    padding: "8px 10px 0",
                  }}
                >
                  Reset timer
                </button>
              )}
            </div>
          </div>
        </SlideShell>
      );
    }

      { id: 16, crumb: { loop: 3, phases: ["TEST"] }, render: ({ isActive, audio }) => <TimerSlide title="Swap + Experience: Final rotation!" duration={360} body={swapBodyL3} variant="driving" isActive={isActive} audio={audio} /> },
      // DEBRIEF · timed synthesis, then hypothesis read-outs (no pitching)
      { id: 17, crumb: { all: true }, render: ({ isActive, audio }) => <Slide24 isActive={isActive} audio={audio} /> },
      { id: 18, render: ({ isActive, audio }) => <PresentationTimerSlide isActive={isActive} audio={audio} duration={90} promptItems={[
        <React.Fragment key="a"><strong>Read your hypothesis aloud</strong>, word for word, straight off the sheet</React.Fragment>,
        <React.Fragment key="b">One <strong>pattern</strong> that emerged across the three loops</React.Fragment>,
        <React.Fragment key="c">What you would <strong>test next</strong></React.Fragment>,
      ]} /> },
      // PROTOVIBING SESSION · your own idea, three timed steps mirroring the paper loops
      { id: 19, render: () => <SlideBrowserDemo /> },  // Live app demo in browser chrome
      { id: 20, render: () => <SoloLaunchSlide /> },  // Your turn + bespoke access QR (swap qr-protovibing-access.png when Marc provides the code)
      { id: 21, crumb: { solo: true, phases: ["IDEA", "PLAN", "CREATE", "TEST"] }, render: ({ isActive, audio }) => <TimerSlide title="Run the loop on your idea" subtitle="Your idea this time. One hypothesis, one test you can run in this room." duration={720} body={pv1Body} variant="bright" isActive={isActive} audio={audio} /> },
      { id: 22, crumb: { solo: true, phases: ["TEST"] }, render: ({ isActive, audio }) => <TimerSlide title="Interview the room" subtitle="Real humans, three meters away. Use everything from the paper loops." duration={360} body={pv2Body} variant="driving" isActive={isActive} audio={audio} /> },
      { id: 23, crumb: { solo: true, phases: ["SYNTHESIZE"] }, render: ({ isActive, audio }) => <TimerSlide title="Feed it back" subtitle="Close the loop in the app." duration={360} body={pv3Body} variant="focused" isActive={isActive} audio={audio} /> },
      // CLOSE · Maven is the reason this workshop is free. Do not cut.
      { id: 24, render: () => <MavenSlide /> },  // Maven cohort CTA
      { id: 25, render: () => <PreBetaSlide /> },  // Free community path · prebeta.club live embed
      { id: 26, render: () => <FinaleSlide /> },  // Fears revisited + feedback QR + lunch (music attribution)
    ];

    // =====================================================
    // MAIN
    // =====================================================
    function Presentation() {
      const [current, setCurrent] = useState(0);
      const [visible, setVisible] = useState(true);
      const [overlay, setOverlay] = useState({ visible: false, url: null, label: null, image: null });
      const openOverlay  = useCallback((url, label, image = null) => setOverlay({ visible: true, url, label, image }), []);
      const closeOverlay = useCallback(() => setOverlay({ visible: false, url: null, label: null, image: null }), []);
      const audioRef = useRef(null);
      if (!audioRef.current) audioRef.current = new AudioEngine();

      const goTo = useCallback((idx) => {
        setCurrent((prev) => {
          const next = Math.max(0, Math.min(SLIDES.length - 1, idx));
          if (next !== prev) {
            // Stop any running music when navigating between slides
            if (audioRef.current) audioRef.current.stopMusic(600);
            setVisible(false);
            setTimeout(() => setVisible(true), 80);
          }
          return next;
        });
      }, []);

      const goNext = useCallback(() => goTo(current + 1), [current, goTo]);
      const goPrev = useCallback(() => goTo(current - 1), [current, goTo]);

      useEffect(() => {
        const handler = (e) => {
          if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
          if (e.key === "Escape") {
            if (overlay.visible) { e.preventDefault(); closeOverlay(); }
            return;
          }
          if (overlay.visible) return; // freeze slide nav while the browser overlay is open
          if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") {
            e.preventDefault();
            goNext();
          } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
            e.preventDefault();
            goPrev();
          } else if (e.key === "Home") {
            goTo(0);
          } else if (e.key === "End") {
            goTo(SLIDES.length - 1);
          }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [goNext, goPrev, goTo, overlay.visible, closeOverlay]);

      useEffect(() => {
        return () => {
          audioRef.current && audioRef.current.stopMusic(0);
        };
      }, []);

      const touchStart = useRef(null);
      const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
      const onTouchEnd = (e) => {
        if (touchStart.current === null) return;
        const dx = e.changedTouches[0].clientX - touchStart.current;
        if (Math.abs(dx) > 50) {
          if (dx < 0) goNext();
          else goPrev();
        }
        touchStart.current = null;
      };

      const slide = SLIDES[current];

      return (
        <BrowserOverlayContext.Provider value={{ open: openOverlay }}>
        <div
          onTouchStart={onTouchStart}
          onTouchEnd={onTouchEnd}
          style={{
            position: "fixed",
            inset: 0,
            color: TEXT,
            fontFamily: FONT_STACK,
            overflow: "hidden",
          }}
        >
          <style>{`
            @keyframes pf-fadeIn { from { opacity: 0 } to { opacity: 1 } }
            @keyframes pf-pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.6 } }
            .pf-fade-in { animation: pf-fadeIn 150ms ease-out forwards; }
            .pf-fade-out { opacity: 0; transition: opacity 80ms ease-in; }
          `}</style>

          {/* Top branding bar: PF lockup · divider · PROTOVIBING.AI · fullscreen icon */}
          <div style={{ position: "fixed", top: 22, left: 26, right: 26, display: "flex", alignItems: "center", zIndex: 50, pointerEvents: "none" }}>
            <PFLockup height={32} />
            <div style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.18)", margin: "0 22px" }} />
            <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.8, color: "rgba(245,245,245,0.55)", fontFamily: FONT_STACK, marginRight: 12 }}>
              PROTOVIBING.AI
            </span>
            <FullscreenButton />
          </div>

          {/* Fixed loop breadcrumb: same position on every timer slide */}
          {slide.crumb && (
            <div style={{ position: "fixed", top: 62, left: 0, right: 0, display: "flex", justifyContent: "center", zIndex: 49, pointerEvents: "none" }}>
              <LoopBreadcrumb loop={slide.crumb.loop} phases={slide.crumb.phases || []} all={slide.crumb.all} solo={slide.crumb.solo} />
            </div>
          )}

          <div
            key={slide.id}
            className={visible ? "pf-fade-in" : "pf-fade-out"}
            style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}
          >
            {slide.render({ isActive: true, audio: audioRef.current })}
          </div>

          {/* Bottom chrome — all on one row at the same vertical baseline.
              Hide the disabled prev arrow on Slide 1 so the welcome-music button can take its spot. */}
          {current !== 0 && (
            <button
              onClick={goPrev}
              aria-label="Previous slide"
              style={{ position: "fixed", left: 16, bottom: 18, background: "rgba(255,255,255,0.04)", color: TEXT_MUTED, border: "1px solid rgba(255,255,255,0.1)", borderRadius: 999, width: 36, height: 36, fontSize: 18, cursor: "pointer", opacity: 0.7, zIndex: 50, fontFamily: FONT_STACK, display: "flex", alignItems: "center", justifyContent: "center" }}
            >
              ←
            </button>
          )}
          {current !== SLIDES.length - 1 && (
            <button
              onClick={goNext}
              aria-label="Next slide"
              style={{ position: "fixed", right: 16, bottom: 18, background: "rgba(255,255,255,0.04)", color: TEXT_MUTED, border: "1px solid rgba(255,255,255,0.1)", borderRadius: 999, width: 36, height: 36, fontSize: 18, cursor: "pointer", opacity: 0.7, zIndex: 50, fontFamily: FONT_STACK, display: "flex", alignItems: "center", justifyContent: "center" }}
            >
              →
            </button>
          )}

          {/* Slide indicator — centered on same baseline */}
          <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", color: TEXT_MUTED, fontSize: 13, letterSpacing: 1.5, fontWeight: 600, zIndex: 50, fontVariantNumeric: "tabular-nums" }}>
            {current + 1} / {SLIDES.length}
          </div>

          {/* Music attribution on the final slide only */}
          {current === SLIDES.length - 1 && (
            <a
              href={MUSIC_ATTRIBUTION_URL}
              target="_blank"
              rel="noopener noreferrer"
              style={{ position: "fixed", bottom: 24, right: 20, fontSize: 12, color: TEXT_MUTED, letterSpacing: 0.3, zIndex: 50, textDecoration: "none", opacity: 0.65 }}
            >
              Music from: HoliznaCC0 · freemusicarchive.org
            </a>
          )}
        </div>
        <BrowserOverlay state={overlay} onClose={closeOverlay} />
        </BrowserOverlayContext.Provider>
      );
    }


    // ===========================================================
    // MOBILE FALLBACK
    // ===========================================================
    function useIsMobile() {
      const get = () => typeof window !== "undefined" && window.matchMedia("(max-width:767px)").matches;
      const [m, setM] = useState(get);
      useEffect(() => {
        const mq = window.matchMedia("(max-width:767px)");
        const cb = e => setM(e.matches);
        mq.addEventListener ? mq.addEventListener("change", cb) : mq.addListener(cb);
        return () => mq.removeEventListener ? mq.removeEventListener("change", cb) : mq.removeListener(cb);
      }, []);
      return m;
    }

    function MobileFallback() {
      return (
        <div style={{
          position: "fixed",
          inset: 0,
          height: "100dvh",
          overflow: "hidden",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          padding: "24px",
          boxSizing: "border-box",
          fontFamily: FONT_STACK,
          color: "#f5f5f5",
          textAlign: "center",
        }}>
          <div style={{ marginBottom: 24 }}>
            <PFLockup height={32} />
          </div>
          <div style={{ fontSize: "0.7rem", fontWeight: 700, letterSpacing: "0.22em", color: "#FFCC64", opacity: 0.7, marginBottom: 16 }}>
            TEST-DRIVE ENTREPRENEURSHIP
          </div>
          <h1 style={{ fontSize: "clamp(1.5rem,6.5vw,2.1rem)", fontWeight: 700, letterSpacing: "-0.02em", lineHeight: 1.1, margin: "0 0 14px" }}>
            Best viewed on a larger screen
          </h1>
          <p style={{ fontSize: "0.95rem", lineHeight: 1.5, maxWidth: 400, opacity: 0.75, margin: "0 0 28px" }}>
            This interactive workshop deck is designed for projectors, desktops,
            and tablets in landscape. Open it on a bigger screen.
          </p>
          {/* Host branding: always present on the fallback */}
          <div style={{
            display: "flex",
            alignItems: "center",
            gap: 14,
            padding: "12px 18px",
            background: "rgba(255,255,255,0.05)",
            border: "1px solid rgba(255,255,255,0.12)",
            borderRadius: 14,
          }}>
            <img
              src="./images/MKrejci - CircleAvatar - WhiteBorder.png"
              alt="Marc Krejci"
              style={{ width: 52, height: 52, borderRadius: "50%", display: "block", flexShrink: 0 }}
            />
            <div style={{ textAlign: "left" }}>
              <div style={{ fontSize: "0.95rem", fontWeight: 700 }}>Marc Krejci</div>
              <div style={{ fontSize: "0.72rem", color: "#a8a8a8", textTransform: "uppercase", letterSpacing: 1 }}>Pathfinder Foundry</div>
              <div style={{ fontSize: "0.85rem", color: "#FFCC64" }}>marc@pfndr.co</div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const isMobile = useIsMobile();
      return isMobile ? <MobileFallback /> : <Presentation />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
